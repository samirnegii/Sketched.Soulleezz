<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Can I keep you? For good.</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Georgia', serif;
        }

        .container {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #fce7f3 0%, #fbcfe8 25%, #f8bbd0 50%, #f48fb1 75%, #ec407a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('couple_image.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
            opacity: 0.85;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(252, 231, 243, 0.3) 0%, rgba(251, 207, 232, 0.4) 25%, rgba(248, 187, 208, 0.5) 50%, rgba(244, 143, 177, 0.6) 75%, rgba(236, 64, 122, 0.7) 100%);
            z-index: 2;
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 3;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: float 8s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px); opacity: 0.5; }
            50% { transform: translateY(-30px) translateX(15px); opacity: 1; }
        }

        .music-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid rgba(255, 255, 255, 0.7);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.3s ease;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .music-button:hover {
            background: white;
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
        }

        .music-button.playing {
            animation: pulse-music 1.5s ease-in-out infinite;
        }

        @keyframes pulse-music {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: fadeInScale 1.2s ease-out;
        }

        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .main-text {
            font-size: 3.5rem;
            font-weight: 700;
            color: white;
            text-shadow: 3px 3px 8px rgba(0, 0, 0, 0.4);
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .emoji-container {
            font-size: 4rem;
            margin: 30px 0;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .emoji {
            display: inline-block;
            margin: 0 20px;
            animation: spin 3s linear infinite;
            filter: drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.3));
        }

        .emoji:nth-child(2) {
            animation: shake 1.5s ease-in-out infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(10deg) scale(1.1); }
            100% { transform: rotate(0deg) scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg) translateX(0); }
            25% { transform: rotate(-5deg) translateX(-5px); }
            75% { transform: rotate(5deg) translateX(5px); }
        }

        .subtitle {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.95);
            margin-top: 40px;
            font-style: italic;
            animation: fadeInSlide 1.5s ease-out 0.3s both;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.3);
        }

        @keyframes fadeInSlide {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .heart-bg {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            top: 10%;
            left: -100px;
            animation: pulse 4s ease-in-out infinite;
            z-index: 2;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.5; }
        }

        .heart-bg:nth-child(4) {
            width: 250px;
            height: 250px;
            bottom: 5%;
            right: -50px;
            animation: pulse 5s ease-in-out infinite 1s;
        }

        .buttons-container {
            position: absolute;
            bottom: 40px;
            display: flex;
            gap: 30px;
            z-index: 50;
            animation: fadeInSlide 1.5s ease-out 0.6s both;
        }

        .btn {
            padding: 12px 35px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .btn-yes {
            background: linear-gradient(135deg, #ff6b9d, #ff1744);
            color: white;
            position: relative;
        }

        .btn-yes:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 23, 68, 0.5);
        }

        .btn-yes:active {
            transform: scale(0.95);
        }

        .btn-no {
            background: white;
            color: #ff1744;
            font-weight: 700;
            position: absolute;
            bottom: 40px;
            right: 50%;
        }

        .celebration {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1000;
        }

        .doodle {
            position: absolute;
            pointer-events: none;
        }

        .heart-doodle {
            font-size: 2rem;
            animation: float-up 2s ease-out forwards;
            filter: drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.3));
        }

        .sparkle-doodle {
            font-size: 1.5rem;
            animation: twinkle-float 1.8s ease-out forwards;
            filter: drop-shadow(1px 1px 3px rgba(0, 0, 0, 0.2));
        }

        .confetti {
            width: 10px;
            height: 10px;
            background: linear-gradient(135deg, #ff6b9d, #ff1744);
            border-radius: 50%;
            animation: confetti-fall 2.5s ease-out forwards;
            box-shadow: 0 0 5px rgba(255, 23, 68, 0.6);
        }

        @keyframes float-up {
            0% {
                opacity: 1;
                transform: translateY(0) translateX(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-150px) translateX(var(--tx)) scale(0.5);
            }
        }

        @keyframes twinkle-float {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-120px) scale(0);
            }
        }

        @keyframes confetti-fall {
            0% {
                opacity: 1;
                transform: translateY(0) translateX(0) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(200px) translateX(var(--tx)) rotate(360deg);
            }
        }

        .success-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5rem;
            font-weight: 700;
            color: white;
            text-shadow: 3px 3px 12px rgba(0, 0, 0, 0.5);
            z-index: 999;
            animation: successPop 0.5s ease-out;
        }

        @keyframes successPop {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.1);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="bg-image"></div>
        <div class="overlay"></div>
        
        <div class="heart-bg"></div>
        <div class="heart-bg" style="animation-delay: 1s;"></div>
        
        <button class="music-button" id="musicBtn" title="Play Music">🎵</button>
        
        <div class="particles" id="particles"></div>
        <div class="celebration" id="celebration"></div>
        
        <div class="content">
            <div class="main-text">Can I keep you?</div>
            <div class="main-text" style="font-size: 2.5rem; margin-bottom: 30px;">For good.</div>
            
            <div class="emoji-container">
                <span class="emoji">❤️</span>
                <span class="emoji">😳</span>
            </div>
            
            <div class="subtitle">✨ A question asked with a whole heart ✨</div>
        </div>

        <div class="buttons-container">
            <button class="btn btn-yes" id="yesBtn">Yes ❤️</button>
            <button class="btn btn-no" id="noBtn">No</button>
        </div>
    </div>

    <audio id="bgMusic" preload="auto">
        <source src="The_Night_We_Met.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Create floating particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 15; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDuration = (6 + Math.random() * 4) + 's';
            particle.style.animationDelay = Math.random() * 2 + 's';
            particlesContainer.appendChild(particle);
        }

        // Music button functionality
        const musicBtn = document.getElementById('musicBtn');
        const bgMusic = document.getElementById('bgMusic');
        let isPlaying = false;

        // Try to autoplay music
        window.addEventListener('load', () => {
            bgMusic.volume = 0.3;
            bgMusic.play().then(() => {
                musicBtn.classList.add('playing');
                isPlaying = true;
            }).catch(err => {
                console.log('Autoplay failed, user can click to play');
            });
        });

        musicBtn.addEventListener('click', () => {
            if (isPlaying) {
                bgMusic.pause();
                musicBtn.classList.remove('playing');
                isPlaying = false;
            } else {
                bgMusic.play().catch(err => console.log('Audio play failed:', err));
                musicBtn.classList.add('playing');
                isPlaying = true;
            }
        });

        // No button - run away on hover
        const noBtn = document.getElementById('noBtn');
        noBtn.addEventListener('mouseenter', () => {
            const randomX = Math.random() * 300 - 150;
            const randomY = Math.random() * 300 - 150;
            noBtn.style.position = 'fixed';
            noBtn.style.transform = `translate(${randomX}px, ${randomY}px)`;
        });

        // Yes button - celebration
        const yesBtn = document.getElementById('yesBtn');
        yesBtn.addEventListener('click', () => {
            triggerCelebration();
        });

        function triggerCelebration() {
            const celebrationDiv = document.getElementById('celebration');
            celebrationDiv.innerHTML = '';
            
            // Create success text
            const successText = document.createElement('div');
            successText.className = 'success-text';
            successText.textContent = '💕 YES! 💕';
            celebrationDiv.appendChild(successText);
            
            // Remove success text after animation
            setTimeout(() => {
                successText.remove();
            }, 2000);
            
            // Create doodles
            const hearts = ['❤️', '💕', '💖', '💗', '💓'];
            const sparkles = ['✨', '⭐', '🌟', '💫'];
            
            for (let i = 0; i < 25; i++) {
                setTimeout(() => {
                    // Hearts
                    if (i % 2 === 0) {
                        const heart = document.createElement('div');
                        heart.className = 'doodle heart-doodle';
                        heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                        heart.style.left = Math.random() * 100 + '%';
                        heart.style.top = '50%';
                        heart.style.setProperty('--tx', (Math.random() - 0.5) * 150 + 'px');
                        celebrationDiv.appendChild(heart);
                        
                        setTimeout(() => heart.remove(), 2000);
                    }
                    // Sparkles
                    else {
                        const sparkle = document.createElement('div');
                        sparkle.className = 'doodle sparkle-doodle';
                        sparkle.textContent = sparkles[Math.floor(Math.random() * sparkles.length)];
                        sparkle.style.left = Math.random() * 100 + '%';
                        sparkle.style.top = '50%';
                        celebrationDiv.appendChild(sparkle);
                        
                        setTimeout(() => sparkle.remove(), 1800);
                    }
                    
                    // Confetti
                    const confetti = document.createElement('div');
                    confetti.className = 'doodle confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.top = '50%';
                    confetti.style.setProperty('--tx', (Math.random() - 0.5) * 200 + 'px');
                    celebrationDiv.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 2500);
                }, i * 50);
            }
        }
    </script>
</body>
</html>
